<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Динозаврик T-Rex</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f7f7f7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #535353;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #535353;
            font-size: 32px;
        }
        p {
            color: #777;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            background-color: #535353;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s, transform: 0.1s;
        }
        button:hover {
            background-color: #333;
            transform: scale(1.05);
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #999;
            font-size: 14px;
        }
    </style>
    <!-- Подключаем Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">Счет: <span id="score">0</span></div>
    
    <div id="game-over-screen">
        <h1>ИГРА ОКОНЧЕНА</h1>
        <p>Ваш финальный счет: <span id="final-score">0</span></p>
        <button id="restart-btn">ИГРАТЬ СНОВА</button>
    </div>

    <div id="instructions">Нажмите ПРОБЕЛ или стрелку ВВЕРХ, чтобы прыгнуть</div>
    <div id="canvas-container"></div>

    <script>
        // --- Настройки игры ---
        let scene, camera, renderer;
        let dino, ground;
        let obstacles = [];
        let clouds = [];
        
        let isPlaying = true;
        let score = 0;
        let gameSpeed = 0.35;
        const maxGameSpeed = 0.8;
        
        // Физика прыжка
        let isJumping = false;
        let jumpVelocity = 0;
        const gravity = 0.015;
        const jumpForce = 0.32;
        const dinoYFloor = 0.5;

        // Таймеры спавна
        let obstacleTimer = 0;
        let cloudTimer = 0;

        // Элементы UI
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const restartBtn = document.getElementById('restart-btn');

        // Инициализация
        init();
        animate();

        function init() {
            // 1. Сцена и Рендерер
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf7f7f7);
            scene.fog = new THREE.FogExp2(0xf7f7f7, 0.015);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 2. Камера (красивый изометрический ракурс сбоку-сзади)
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-15, 8, 20);
            camera.lookAt(5, 2, 0);

            // 3. Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(-20, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 100;
            const d = 20;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            scene.add(dirLight);

            // 4. Земля
            const groundGeo = new THREE.BoxGeometry(200, 1, 10);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.8 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);

            // Добавим декоративную линию разметки на земле
            const lineGeo = new THREE.BoxGeometry(200, 0.01, 0.1);
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xd0d0d0 });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.position.set(0, 0.01, 0);
            scene.add(line);

            // 5. Создание Динозаврика (3D Воксельный стиль)
            createDino();

            // Управление
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('touchstart', triggerJump);
            restartBtn.addEventListener('click', restartGame);
            window.addEventListener('resize', onWindowResize);
        }

        function createDino() {
            dino = new THREE.Group();

            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x535353, roughness: 0.6 });
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

            // Тело
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1, 0.8), bodyMat);
            body.position.y = 0.7;
            body.castShadow = true;
            dino.add(body);

            // Шея и голова
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), bodyMat);
            head.position.set(0.6, 1.4, 0);
            head.castShadow = true;
            dino.add(head);

            const snout = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.8), bodyMat);
            snout.position.set(1.1, 1.4, 0);
            snout.castShadow = true;
            dino.add(snout);

            // Глаза
            const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.1), eyeMat);
            eyeL.position.set(0.8, 1.5, 0.41);
            const pupilL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.08, 0.05), pupilMat);
            pupilL.position.set(0.83, 1.5, 0.44);
            dino.add(eyeL, pupilL);

            const eyeR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.1), eyeMat);
            eyeR.position.set(0.8, 1.5, -0.41);
            const pupilR = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.08, 0.05), pupilMat);
            pupilR.position.set(0.83, 1.5, -0.44);
            dino.add(eyeR, pupilR);

            // Хвост
            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.6), bodyMat);
            tail.position.set(-0.8, 0.6, 0);
            tail.castShadow = true;
            dino.add(tail);

            // Лапки (создаем отдельные группы для анимации)
            dino.legL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.25), bodyMat);
            dino.legL.position.set(0.2, 0.25, 0.25);
            dino.legL.castShadow = true;
            dino.add(dino.legL);

            dino.legR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.25), bodyMat);
            dino.legR.position.set(0.2, 0.25, -0.25);
            dino.legR.castShadow = true;
            dino.add(dino.legR);

            // Короткие ручки
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.2), bodyMat);
            arm.position.set(1.0, 1.0, 0.3);
            dino.add(arm);

            dino.position.set(0, dinoYFloor, 0);
            scene.add(dino);
        }

        function createCactus(xPos) {
            const cactusGroup = new THREE.Group();
            const cactusMat = new THREE.MeshStandardMaterial({ color: 0x487a48, roughness: 0.8 });

            // Случайная высота кактуса
            const height = 1.2 + Math.random() * 0.8;
            const width = 0.3;

            // Главный ствол
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(width, height, width), cactusMat);
            trunk.position.y = height / 2;
            trunk.castShadow = true;
            cactusGroup.add(trunk);

            // Отростки (веточки) для красоты
            if (height > 1.4) {
                const branch1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, width, width), cactusMat);
                branch1.position.set(0.3, height * 0.6, 0);
                const branch1Up = new THREE.Mesh(new THREE.BoxGeometry(width, 0.4, width), cactusMat);
                branch1Up.position.set(0.5, height * 0.6 + 0.15, 0);
                cactusGroup.add(branch1, branch1Up);

                if (Math.random() > 0.5) {
                    const branch2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, width, width), cactusMat);
                    branch2.position.set(-0.3, height * 0.4, 0);
                    const branch2Up = new THREE.Mesh(new THREE.BoxGeometry(width, 0.4, width), cactusMat);
                    branch2Up.position.set(-0.5, height * 0.4 + 0.15, 0);
                    cactusGroup.add(branch2, branch2Up);
                }
            }

            cactusGroup.position.set(xPos, 0, (Math.random() - 0.5) * 0.5); // легкое смещение по Z
            
            // Запоминаем радиус коллизии
            cactusGroup.userData = { 
                width: width + 0.2, 
                height: height 
            };

            scene.add(cactusGroup);
            obstacles.push(cactusGroup);
        }

        function createCloud() {
            const cloudGroup = new THREE.Group();
            const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9, flatShading: true });

            const numBlocks = 3 + Math.floor(Math.random() * 3);
            for(let i=0; i<numBlocks; i++) {
                const w = 1 + Math.random() * 2;
                const h = 0.6 + Math.random() * 0.6;
                const d = 1 + Math.random();
                const block = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), cloudMat);
                block.position.set(i * 0.8, (Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.5);
                cloudGroup.add(block);
            }

            cloudGroup.position.set(60, 6 + Math.random() * 4, -10 - Math.random() * 10);
            scene.add(cloudGroup);
            clouds.push(cloudGroup);
        }

        // --- Игровой цикл ---
        function animate(time) {
            requestAnimationFrame(animate);

            if (isPlaying) {
                // 1. Увеличение сложности и счета
                score += 1;
                scoreEl.innerText = Math.floor(score / 5);
                if (gameSpeed < maxGameSpeed) gameSpeed += 0.0001;

                // 2. Физика прыжка Динозавра
                if (isJumping) {
                    jumpVelocity -= gravity;
                    dino.position.y += jumpVelocity;

                    if (dino.position.y <= dinoYFloor) {
                        dino.position.y = dinoYFloor;
                        isJumping = false;
                        jumpVelocity = 0;
                    }
                    // В прыжке ноги ставим ровно
                    dino.legL.rotation.z = 0;
                    dino.legR.rotation.z = 0;
                } else {
                    // Анимация бега
                    const speedMultiplier = gameSpeed * 25;
                    dino.legL.rotation.z = Math.sin(time * 0.015 * speedMultiplier) * 0.6;
                    dino.legR.rotation.z = -Math.sin(time * 0.015 * speedMultiplier) * 0.6;
                }

                // 3. Генерация и Движение Препятствий (Кактусов)
                obstacleTimer -= 1;
                if (obstacleTimer <= 0) {
                    createCactus(50);
                    obstacleTimer = 60 + Math.random() * 100 / gameSpeed; // Частота зависит от скорости
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].position.x -= gameSpeed;

                    // Проверка столкновения (Простая AABB коллизия)
                    let dX = Math.abs(dino.position.x - obstacles[i].position.x);
                    let dY = dino.position.y - dinoYFloor; // Высота над землей
                    
                    if (dX < 0.8 && dY < obstacles[i].userData.height - 0.2) {
                        gameOver();
                    }

                    // Удаление вышедших за экран объектов
                    if (obstacles[i].position.x < -20) {
                        scene.remove(obstacles[i]);
                        obstacles.splice(i, 1);
                    }
                }

                // 4. Движение Облаков
                cloudTimer -= 1;
                if (cloudTimer <= 0) {
                    createCloud();
                    cloudTimer = 150 + Math.random() * 200;
                }

                for (let i = clouds.length - 1; i >= 0; i--) {
                    clouds[i].position.x -= gameSpeed * 0.3; // Облака движутся медленнее
                    if (clouds[i].position.x < -40) {
                        scene.remove(clouds[i]);
                        clouds.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // --- Управление ---
        function onKeyDown(e) {
            if ((e.code === 'Space' || e.code === 'ArrowUp')) {
                triggerJump();
            }
        }

        function triggerJump() {
            if (!isJumping && isPlaying) {
                jumpVelocity = jumpForce;
                isJumping = true;
            }
        }

        function gameOver() {
            isPlaying = false;
            finalScoreEl.innerText = Math.floor(score / 5);
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            // Очищаем препятствия
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            
            // Очищаем облака
            clouds.forEach(cl => scene.remove(cl));
            clouds = [];

            // Сброс параметров
            score = 0;
            gameSpeed = 0.35;
            dino.position.set(0, dinoYFloor, 0);
            isJumping = false;
            jumpVelocity = 0;
            obstacleTimer = 0;
            
            gameOverScreen.style.display = 'none';
            isPlaying = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
