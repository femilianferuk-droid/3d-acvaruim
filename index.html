<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Crash - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-webapps.js"></script>
    <style>
        :root {
            --bg-main: #07090e;
            --bg-card: #0f131c;
            --bg-input: #171d2a;
            --color-accent: #6366f1;
            --color-success: #00e676;
            --color-danger: #ff1744;
            --color-star: #ffca28;
            --text-main: #ffffff;
            --text-muted: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            padding: 12px;
            position: relative;
        }

        /* Хедер профиля */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            background: var(--bg-card);
            padding: 10px 14px;
            border-radius: 16px;
            border: 1px solid #1e293b;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            background-position: center;
            background-size: cover;
            border: 1.5px solid #2d3748;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.2;
        }

        .user-id {
            font-size: 11px;
            color: #64748b;
            margin-top: 1px;
        }

        .balance-badge {
            background: rgba(255, 202, 40, 0.08);
            border: 1px solid rgba(255, 202, 40, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 700;
            font-size: 15px;
            color: var(--color-star);
        }

        /* История */
        .history-section {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            margin-bottom: 10px;
            padding-bottom: 2px;
        }
        
        .history-section::-webkit-scrollbar { display: none; }

        .history-badge {
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .badge-low { background: rgba(255, 23, 68, 0.1); color: var(--color-danger); }
        .badge-high { background: rgba(0, 230, 118, 0.1); color: var(--color-success); }

        /* Игровой экран */
        .game-display {
            flex-grow: 1;
            background: var(--bg-card);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid #1e293b;
            min-height: 180px;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .multiplier-overlay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            font-weight: 900;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 4px 16px rgba(0,0,0,0.7);
        }

        .status-overlay {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            background: rgba(15, 23, 42, 0.7);
            padding: 5px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* Активные ставки (Без ботов) */
        .active-bets-container {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 10px 14px;
            border: 1px solid #1e293b;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .bets-header {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .live-bet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            padding: 6px 0;
        }

        .no-bets-text {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            padding: 4px 0;
            font-style: italic;
        }

        /* Панель управления */
        .betting-panel {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row {
            display: flex;
            background: var(--bg-input);
            border-radius: 14px;
            padding: 8px 12px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #243049;
        }

        .input-row label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
        }

        .bet-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 700;
            text-align: right;
            width: 110px;
            outline: none;
        }

        .presets-row {
            display: flex;
            gap: 6px;
        }

        .preset-btn {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid #243049;
            color: var(--text-main);
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .action-btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-size: 17px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .action-btn:active { transform: scale(0.98); }
        .btn-deposit { background: linear-gradient(135deg, #22c55e, #15803d); }
        .btn-ready { background: linear-gradient(135deg, #4f46e5, #3730a3); }
        .btn-cancel { background: #334155; color: #f1f5f9; }
        .btn-cashout { background: linear-gradient(135deg, var(--color-success), #16a34a); color: #000; }
        .btn-disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

        .error-toast {
            color: var(--color-danger);
            font-size: 12px;
            text-align: center;
            font-weight: 600;
            min-height: 14px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="user-profile">
                <div id="user-avatar" class="avatar">TG</div>
                <div class="user-info">
                    <span class="username" id="user-name">Подключение...</span>
                    <span class="user-id" id="user-id">ID: ------</span>
                </div>
            </div>
            <div class="balance-badge">
                <span id="balance-val">10.00</span> ⭐
            </div>
        </header>

        <div class="history-section" id="history-container"></div>

        <div class="game-display" id="display-container">
            <div id="multiplier-text" class="multiplier-overlay">🚀</div>
            <div id="status-overlay" class="status-overlay">Синхронизация...</div>
            <canvas id="crash-canvas"></canvas>
        </div>

        <div class="active-bets-container">
            <div class="bets-header">Активная ставка в раунде</div>
            <div id="active-bets-list">
                <div class="no-bets-text">Ставок нет</div>
            </div>
        </div>

        <div class="betting-panel">
            <div class="input-row">
                <label>Размер</label>
                <div style="display:flex; align-items:center;">
                    <input type="number" id="bet-input-field" class="bet-input" value="1.0" min="0.1" step="0.1">
                    <span style="color:var(--color-star); font-weight:700; padding-left:4px;">⭐</span>
                </div>
            </div>

            <div class="presets-row">
                <button class="preset-btn" onclick="setPreset('min')">Мин</button>
                <button class="preset-btn" onclick="setPreset('add', 0.5)">+0.5</button>
                <button class="preset-btn" onclick="setPreset('add', 2)">+2</button>
                <button class="preset-btn" onclick="setPreset('max')">Макс</button>
            </div>

            <div id="error-message" class="error-toast"></div>

            <button id="main-action-btn" class="action-btn btn-ready" onclick="handleMainAction()">ПОСТАВИТЬ</button>
        </div>
    </div>

    <script>
        const COLORS = {
            accent: '#6366f1',
            success: '#00e676',
            danger: '#ff1744',
            grid: '#151c28',
            text: '#ffffff'
        };

        let balance = 10.00;
        let history = [];
        let tgUserId = "tg_user"; 

        let gameState = 'WAITING'; 
        let timeToStart = 10.0;
        let currentMultiplier = 1.00;
        let crashPoint = 1.00;
        let gameStartTime = 0;

        let betState = 'NONE'; 
        let currentBetAmount = 0;
        let wonAmount = 0;

        const canvas = document.getElementById('crash-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        window.onload = () => {
            // Безопасный опрос Telegram SDK с авто-выходом из цикла
            let authAttempts = 0;
            const authInterval = setInterval(() => {
                authAttempts++;
                const isLoaded = initTelegramProfile();
                // Если считали данные или прошло 1.5 секунды — прекращаем опрос и рендерим то, что есть
                if (isLoaded || authAttempts > 15) {
                    clearInterval(authInterval);
                    if(!isLoaded) forceDefaultProfile();
                }
            }, 100);

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            setInterval(syncWithAbsoluteTime, 30);
            requestAnimationFrame(animationLoop);
        };

        function resizeCanvas() {
            const container = document.getElementById('display-container');
            canvas.width = container.clientWidth * window.devicePixelRatio;
            canvas.height = container.clientHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        // АВТОРИЗАЦИЯ ИЗ TELEGRAM MINI APP
        function initTelegramProfile() {
            const tgApp = window.Telegram?.WebApp;
            if (tgApp) {
                tgApp.ready();
                tgApp.expand();
                
                const user = tgApp.initDataUnsafe?.user || tgApp.initData?.user;
                if (user) {
                    tgUserId = user.id.toString();
                    let displayName = user.username ? "@" + user.username : (user.first_name + (user.last_name ? " " + user.last_name : ""));
                    
                    document.getElementById('user-name').innerText = displayName;
                    document.getElementById('user-id').innerText = "ID: " + tgUserId;

                    const avatarBox = document.getElementById('user-avatar');
                    if (user.photo_url) {
                        avatarBox.style.backgroundImage = `url('${user.photo_url}')`;
                        avatarBox.innerText = ""; 
                    } else {
                        avatarBox.style.backgroundImage = "none";
                        avatarBox.innerText = user.first_name ? user.first_name.substring(0, 2).toUpperCase() : "TG";
                    }
                    
                    loadSavedData();
                    return true;
                }
            }
            return false;
        }

        // Страховочный фоллбек, если ТГ вернул пустой объект (чтобы не висела вечная загрузка)
        function forceDefaultProfile() {
            tgUserId = "tg_player";
            document.getElementById('user-name').innerText = "Telegram Player";
            document.getElementById('user-id').innerText = "ID: " + Math.floor(100000 + Math.random() * 900000);
            document.getElementById('user-avatar').innerText = "TG";
            loadSavedData();
        }

        function loadSavedData() {
            const savedBalance = localStorage.getItem(`tg_crash_balance_${tgUserId}`);
            balance = savedBalance !== null ? parseFloat(savedBalance) : 10.00;

            const savedHistory = localStorage.getItem(`tg_crash_history_${tgUserId}`);
            history = savedHistory !== null ? JSON.parse(savedHistory) : [1.45, 2.10, 1.05, 4.25];

            updateBalanceUI();
            renderHistoryUI();
            updateBetsListUI();
        }

        function updateBalanceUI() {
            document.getElementById('balance-val').innerText = balance.toFixed(2);
            localStorage.setItem(`tg_crash_balance_${tgUserId}`, balance.toFixed(2));
        }

        function renderHistoryUI() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            history.slice(0, 12).forEach(mult => {
                const badge = document.createElement('div');
                badge.className = `history-badge ${mult >= 2.0 ? 'badge-high' : 'badge-low'}`;
                badge.innerText = mult.toFixed(2) + 'x';
                container.appendChild(badge);
            });
        }

        function updateBetsListUI() {
            const list = document.getElementById('active-bets-list');
            list.innerHTML = '';

            if (betState === 'NONE') {
                list.innerHTML = '<div class="no-bets-text">Ставок нет</div>';
                return;
            }

            const row = document.createElement('div');
            row.className = 'live-bet-row';

            let statusText = '';
            let styleColor = '#fff';

            if (betState === 'PLACED') {
                statusText = 'Ожидание взлёта...';
                styleColor = 'var(--color-star)';
            } else if (betState === 'INGAME') {
                let currentWin = currentBetAmount * currentMultiplier;
                statusText = `В игре (${currentMultiplier.toFixed(2)}x) -> +${currentWin.toFixed(2)} ⭐`;
                styleColor = COLORS.accent;
            } else if (betState === 'CASHED_OUT') {
                statusText = `Выиграл +${wonAmount.toFixed(2)} ⭐`;
                styleColor = 'var(--color-success)';
            }

            row.innerHTML = `
                <span style="font-weight:600;">Моя ставка: ${currentBetAmount.toFixed(1)} ⭐</span>
                <span style="color: ${styleColor}; font-weight:700; font-size:13px;">${statusText}</span>
            `;
            list.appendChild(row);
        }

        function pushToHistoryLog(mult) {
            history.unshift(mult);
            if (history.length > 20) history.pop();
            localStorage.setItem(`tg_crash_history_${tgUserId}`, JSON.stringify(history));
            renderHistoryUI();
        }

        // --- РЕЖИССЕР НА Unix-ВРЕМЕНИ (АБСОЛЮТНЫЙ РЕАЛТАЙМ ДЛЯ ВСЕХ ОКЛАДОК) ---
        function syncWithAbsoluteTime() {
            let activeRound = JSON.parse(localStorage.getItem('tg_crash_global_round'));
            const now = Date.now();

            if (!activeRound || now >= activeRound.nextRoundStartTime) {
                const bettingDuration = 10000; 
                const bettingStartTime = now;
                const bettingEndTime = bettingStartTime + bettingDuration;
                
                let cp = 1.00;
                if (Math.random() >= 0.04) {
                    let e = Math.random();
                    cp = parseFloat((0.96 / (1 - e)).toFixed(2));
                    if (cp < 1.01) cp = 1.01;
                    if (cp > 25) cp = parseFloat((3 + Math.random() * 10).toFixed(2));
                }
                
                const flightDuration = (Math.log(cp) / 0.065) * 1000;
                const crashTime = bettingEndTime + flightDuration;
                const nextRoundStartTime = crashTime + 3000; 

                activeRound = { bettingStartTime, bettingEndTime, crashTime, nextRoundStartTime, crashPoint: cp };
                localStorage.setItem('tg_crash_global_round', JSON.stringify(activeRound));
            }

            crashPoint = activeRound.crashPoint;

            if (now < activeRound.bettingEndTime) {
                gameState = 'WAITING';
                timeToStart = (activeRound.bettingEndTime - now) / 1000;
                
                if (betState === 'CASHED_OUT' || betState === 'INGAME') {
                    betState = 'NONE';
                    currentBetAmount = 0;
                }
            } 
            else if (now >= activeRound.bettingEndTime && now < activeRound.crashTime) {
                gameState = 'FLYING';
                gameStartTime = activeRound.bettingEndTime;
                
                let elapsed = (now - gameStartTime) / 1000;
                currentMultiplier = parseFloat(Math.pow(Math.E, 0.065 * elapsed).toFixed(2));
                if (currentMultiplier >= crashPoint) currentMultiplier = crashPoint;

                if (betState === 'PLACED') betState = 'INGAME';
            } 
            else {
                if (gameState !== 'CRASHED') {
                    gameState = 'CRASHED';
                    currentMultiplier = crashPoint;
                    particles = [];

                    let lastLogged = localStorage.getItem('tg_crash_last_logged_id');
                    if (lastLogged !== activeRound.bettingStartTime.toString()) {
                        pushToHistoryLog(crashPoint);
                        localStorage.setItem('tg_crash_last_logged_id', activeRound.bettingStartTime.toString());
                    }

                    if (betState === 'INGAME') betState = 'NONE'; 
                }
            }
            updateButtonUI();
            updateBetsListUI();
        }

        // --- УПРАВЛЕНИЕ СТАВКАМИ ---
        function setPreset(action, val) {
            if (gameState !== 'WAITING' || betState === 'PLACED') return;
            const input = document.getElementById('bet-input-field');
            let currentVal = parseFloat(input.value) || 0;

            if (action === 'min') input.value = "0.1";
            else if (action === 'max') input.value = Math.floor(balance * 10) / 10;
            else if (action === 'add') {
                let res = currentVal + val;
                if (res > balance) res = balance;
                input.value = res.toFixed(1);
            }
        }

        function handleMainAction() {
            const errorElement = document.getElementById('error-message');
            errorElement.innerText = "";

            if (gameState === 'WAITING' && betState === 'NONE') {
                const input = document.getElementById('bet-input-field');
                const amt = parseFloat(input.value);

                if (isNaN(amt) || amt < 0.1) {
                    errorElement.innerText = "Мин. ставка: 0.1 ⭐";
                    return;
                }
                if (amt > balance) {
                    errorElement.innerText = "Недостаточно звезд!";
                    return;
                }

                balance -= amt;
                currentBetAmount = amt;
                betState = 'PLACED';
                updateBalanceUI();
                updateButtonUI();
            }
            else if (gameState === 'WAITING' && betState === 'PLACED') {
                balance += currentBetAmount;
                currentBetAmount = 0;
                betState = 'NONE';
                updateBalanceUI();
                updateButtonUI();
            }
            else if (gameState === 'FLYING' && betState === 'INGAME') {
                betState = 'CASHED_OUT';
                wonAmount = currentBetAmount * currentMultiplier;
                balance += wonAmount;
                updateBalanceUI();
                updateButtonUI();
            }
        }

        function updateButtonUI() {
            const btn = document.getElementById('main-action-btn');
            
            if (balance <= 0 && betState === 'NONE' && gameState === 'WAITING') {
                btn.innerText = "ПОЛУЧИТЬ +10 ⭐";
                btn.className = "action-btn btn-deposit";
                btn.onclick = () => {
                    balance = 10.00;
                    updateBalanceUI();
                    updateButtonUI();
                    btn.onclick = handleMainAction;
                };
                return;
            } else {
                btn.onclick = handleMainAction;
            }

            if (gameState === 'WAITING') {
                if (betState === 'PLACED') {
                    btn.innerText = `ОТМЕНА (${currentBetAmount.toFixed(1)} ⭐)`;
                    btn.className = "action-btn btn-cancel";
                } else {
                    btn.innerText = "ПОСТАВИТЬ СТАВКУ";
                    btn.className = "action-btn btn-ready";
                }
            } 
            else if (gameState === 'FLYING') {
                if (betState === 'INGAME') {
                    let liveWin = currentBetAmount * currentMultiplier;
                    btn.innerText = `ЗАБРАТЬ ${liveWin.toFixed(2)} ⭐`;
                    btn.className = "action-btn btn-cashout";
                } else if (betState === 'CASHED_OUT') {
                    btn.innerText = `ЗАБРАНО (+${wonAmount.toFixed(2)} ⭐)`;
                    btn.className = "action-btn btn-disabled";
                } else {
                    btn.innerText = "РАУНД ИДЕТ...";
                    btn.className = "action-btn btn-disabled";
                }
            } 
            else if (gameState === 'CRASHED') {
                btn.innerText = "ВЗРЫВ!";
                btn.className = "action-btn btn-disabled";
            }
        }

        // --- CANVAS ИСПРАВЛЕННАЯ СТАБИЛЬНАЯ ОТРИСОВКА ПОЛЕТА ---
        function animationLoop() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            const multText = document.getElementById('multiplier-text');
            const statusText = document.getElementById('status-overlay');

            if (gameState === 'WAITING') {
                multText.innerText = `🚀`;
                multText.style.color = COLORS.text;
                statusText.innerText = `Взлет через: ${timeToStart.toFixed(1)}с`;
                drawGrid(w, h);
            } 
            else if (gameState === 'FLYING') {
                multText.innerText = currentMultiplier.toFixed(2) + 'x';
                multText.style.color = COLORS.text;
                statusText.innerText = `Раунд активен`;
                let progress = Math.min(1, (currentMultiplier - 1) / 3.5); 
                drawGameScene(w, h, progress, false);
            } 
            else if (gameState === 'CRASHED') {
                multText.innerText = `💥 ${currentMultiplier.toFixed(2)}x`;
                multText.style.color = COLORS.danger;
                statusText.innerText = `Взрыв! Набор высоты...`;
                let progress = Math.min(1, (currentMultiplier - 1) / 3.5);
                drawGameScene(w, h, progress, true);
            }

            requestAnimationFrame(animationLoop);
        }

        function drawGrid(w, h) {
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 1;
            let step = w / 5;
            for(let i=1; i<5; i++) {
                ctx.beginPath(); ctx.moveTo(i * step, 0); ctx.lineTo(i * step, h); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * (h/5)); ctx.lineTo(w, i * (h/5)); ctx.stroke();
            }
        }

        function drawGameScene(w, h, progress, isCrashed) {
            drawGrid(w, h);

            let startX = 45;
            let startY = h - 45;
            let endX = startX + (w - startX - 80) * Math.min(1, progress + 0.1);
            let endY = startY - (startY - 60) * Math.min(1, progress + 0.1);

            if(progress === 0) { endX = startX; endY = startY; }

            let cpX = startX + (endX - startX) * 0.75;
            let cpY = startY;

            ctx.strokeStyle = isCrashed ? COLORS.danger : COLORS.accent;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(cpX, cpY, endX, endY);
            ctx.stroke();

            if (!isCrashed) {
                ctx.lineTo(endX, startY); ctx.lineTo(startX, startY);
                let gradient = ctx.createLinearGradient(0, endY, 0, startY);
                gradient.addColorStop(0, 'rgba(99, 102, 241, 0.18)');
                gradient.addColorStop(1, 'rgba(99, 102, 241, 0.0)');
                ctx.fillStyle = gradient; ctx.fill();
            }

            // Искры из двигателя
            if (!isCrashed && gameState === 'FLYING') {
                if (Math.random() < 0.8) {
                    particles.push({
                        x: endX - 6, y: endY + 2,
                        vx: - (Math.random() * 2.5 + 1), vy: Math.random() * 2 - 1,
                        alpha: 1, size: Math.random() * 3 + 1
                    });
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.035;
                if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                ctx.fillStyle = `rgba(255, ${Math.floor(p.alpha * 160 + 40)}, 20, ${p.alpha})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            }

            if (isCrashed) {
                ctx.fillStyle = COLORS.danger; ctx.beginPath(); ctx.arc(endX, endY, 22, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ff9100'; ctx.beginPath(); ctx.arc(endX, endY, 12, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = COLORS.star; ctx.beginPath(); ctx.arc(endX, endY, 6, 0, Math.PI * 2); ctx.fill();
            } else {
                // ИСПРАВЛЕННЫЙ ПЛАВНЫЙ НАКЛОН РАКЕТЫ СТРОГО ПО ТРАЕКТОРИИ (БЕЗ КРУГОВЫХ ВРАЩЕНИЙ)
                ctx.save();
                ctx.translate(endX, endY);
                
                // Угол наклона вычисляется по текущему вектору движения кривой Безье (вправо-влево/вверх-вниз)
                let pathAngle = Math.atan2(endY - cpY, endX - cpX);
                
                // Легкое покачивание (турбулентность), ракета вибрирует влево-вправо/вверх-вниз на пару градусов
                let turbulence = Math.sin(Date.now() / 80) * 0.03; 
                
                ctx.rotate(pathAngle + turbulence); 

                // Огонь
                let fireGlow = ctx.createRadialGradient(-10, 0, 1, -18, 0, 8);
                fireGlow.addColorStop(0, '#ffffff');
                fireGlow.addColorStop(0.4, '#ff3d00');
                fireGlow.addColorStop(1, 'rgba(255, 61, 0, 0)');
                ctx.fillStyle = fireGlow;
                ctx.beginPath(); ctx.arc(-10, 0, 8, 0, Math.PI * 2); ctx.fill();

                // Шаттл (Нос изначально смотрит вправо)
                let shipGrad = ctx.createLinearGradient(-10, 0, 14, 0);
                shipGrad.addColorStop(0, '#818cf8');
                shipGrad.addColorStop(0.5, '#c084fc');
                shipGrad.addColorStop(1, '#ffffff');
                
                ctx.fillStyle = shipGrad;
                ctx.beginPath();
                ctx.moveTo(14, 0); 
                ctx.quadraticCurveTo(3, -6, -10, -4); 
                ctx.lineTo(-8, 0); 
                ctx.lineTo(-10, 4); 
                ctx.quadraticCurveTo(3, 6, 14, 0);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = '#f1f5f9';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Иллюминатор
                ctx.fillStyle = '#06b6d4';
                ctx.beginPath(); ctx.arc(2, 0, 2.5, 0, Math.PI*2); ctx.fill();

                ctx.restore();
            }
        }
    </script>
</body>
