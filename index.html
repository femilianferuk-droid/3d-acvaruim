<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D T-Rex Runner: Evolution</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1c2e;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }
        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(20, 20, 35, 0.85);
            border: 2px solid #ff4a5a;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 74, 90, 0.4);
            backdrop-filter: blur(10px);
            display: none;
            color: white;
        }
        h1 {
            margin: 0 0 15px 0;
            color: #ff4a5a;
            font-size: 36px;
            letter-spacing: 2px;
        }
        p {
            color: #ccc;
            font-size: 18px;
            margin-bottom: 25px;
        }
        button {
            padding: 15px 35px;
            font-size: 18px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            background-color: #ff4a5a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 74, 90, 0.4);
            transition: all 0.2s;
        }
        button:hover {
            background-color: #ff2a3a;
            transform: scale(1.05) translateY(-2px);
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }
        /* Кнопки для мобилок */
        #mobile-ctrls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .mob-btn {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        @media (min-width: 768px) {
            #mobile-ctrls { display: none; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <div>Счет: <span id="score">0</span></div>
        <div>Рекорд: <span id="highscore">0</span></div>
    </div>
    
    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <p>Ваш результат: <span id="final-score">0</span></p>
        <button id="restart-btn">ПОВТОРИТЬ</button>
    </div>

    <div id="instructions">
        [ПРОБЕЛ / ВВЕРХ] — Прыжок &nbsp;&nbsp;|&nbsp;&nbsp; [СТРЕЛКА ВНИЗ] — Присесть
    </div>

    <div id="mobile-ctrls">
        <div class="mob-btn" id="mob-jump">UP</div>
        <div class="mob-btn" id="mob-duck">DOWN</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, ambientLight, dirLight;
        let dino, ground;
        let obstacles = [], clouds = [], mountains = [], scenery = [], particles = [];
        
        let isPlaying = true;
        let score = 0;
        let highScore = localStorage.getItem('dino3d_highscore') || 0;
        let gameSpeed = 0.4;
        const maxGameSpeed = 0.9;
        
        // Физика и состояния
        let isJumping = false;
        let isDucking = false;
        let jumpVelocity = 0;
        const gravity = 0.016;
        const jumpForce = 0.34;
        const dinoYFloor = 0.5;

        // Таймеры
        let obstacleTimer = 0;
        let cloudTimer = 0;
        let mountainTimer = 0;
        let sceneryTimer = 0;

        // Цвета для циклов дня/ночи
        const daySky = new THREE.Color(0xffa17a); // Теплый закат
        const nightSky = new THREE.Color(0x0d0d1a); // Глубокая ночь
        const dayGround = new THREE.Color(0xd2b48c);
        const nightGround = new THREE.Color(0x16162d);

        document.getElementById('highscore').innerText = highScore;
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const restartBtn = document.getElementById('restart-btn');

        init();
        animate(0);

        function init() {
            scene = new THREE.Scene();
            scene.background = daySky.clone();
            scene.fog = new THREE.FogExp2(daySky.getHex(), 0.012);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-14, 7, 16);
            camera.lookAt(4, 2.5, 0);

            // Свет
            ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(-20, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 100;
            let d = 25;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            scene.add(dirLight);

            // Освещение для создания неонового контура сзади
            const backLight = new THREE.DirectionalLight(0xff7b00, 0.5);
            backLight.position.set(30, 10, -20);
            scene.add(backLight);

            // Дорога
            const groundGeo = new THREE.BoxGeometry(200, 1, 5);
            const groundMat = new THREE.MeshStandardMaterial({ color: dayGround, roughness: 0.9 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);

            createDino();
            
            // Первичная генерация гор для старта
            for(let i=0; i<5; i++) {
                createMountain(i * 25 - 20);
            }

            // Управление
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);

            // Мобилки
            document.getElementById('mob-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if(!isJumping && isPlaying) { jumpVelocity = jumpForce; isJumping = true; } });
            document.getElementById('mob-duck').addEventListener('touchstart', (e) => { e.preventDefault(); isDucking = true; });
            document.getElementById('mob-duck').addEventListener('touchend', (e) => { e.preventDefault(); isDucking = false; });
            restartBtn.addEventListener('click', restartGame);
        }

        function createDino() {
            dino = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2b, roughness: 0.5 });
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0xff4a5a }); // Злые красные зрачки

            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.9, 0.7), bodyMat);
            body.position.y = 0.75;
            body.castShadow = true;
            dino.add(body);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 0.7), bodyMat);
            head.position.set(0.6, 1.4, 0);
            head.castShadow = true;
            dino.add(head);

            const snout = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.7), bodyMat);
            snout.position.set(1.1, 1.35, 0);
            dino.add(snout);

            // Глаза
            const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), eyeMat);
            eyeL.position.set(0.7, 1.45, 0.36);
            const pupilL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.05), pupilMat);
            pupilL.position.set(0.73, 1.45, 0.39);
            dino.add(eyeL, pupilL);

            const eyeR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), eyeMat);
            eyeR.position.set(0.7, 1.45, -0.36);
            const pupilR = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.05), pupilMat);
            pupilR.position.set(0.73, 1.45, -0.39);
            dino.add(eyeR, pupilR);

            // Хвост
            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.5), bodyMat);
            tail.position.set(-0.8, 0.7, 0);
            tail.rotation.z = -0.2;
            tail.castShadow = true;
            dino.add(tail);

            // Лапы
            dino.legL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.22), bodyMat);
            dino.legL.position.set(0.2, 0.25, 0.22);
            dino.legL.castShadow = true;
            dino.add(dino.legL);

            dino.legR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.22), bodyMat);
            dino.legR.position.set(0.2, 0.25, -0.22);
            dino.legR.castShadow = true;
            dino.add(dino.legR);

            dino.position.set(0, dinoYFloor, 0);
            scene.add(dino);
        }

        function createCactus(xPos) {
            const cactus = new THREE.Group();
            const cactusMat = new THREE.MeshStandardMaterial({ color: 0x1f4d36, roughness: 0.8, flatShading:true });

            const height = 1.0 + Math.random() * 0.9;
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.3, height, 0.3), cactusMat);
            trunk.position.y = height / 2;
            trunk.castShadow = true;
            cactus.add(trunk);

            if (height > 1.3) {
                const b1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.25, 0.25), cactusMat);
                b1.position.set(0.25, height * 0.55, 0);
                const b1U = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.4, 0.25), cactusMat);
                b1U.position.set(0.4, height * 0.55 + 0.15, 0);
                cactus.add(b1, b1U);
            }

            cactus.position.set(xPos, 0, (Math.random() - 0.5) * 0.4);
            cactus.userData = { type: 'cactus' };
            scene.add(cactus);
            obstacles.push(cactus);
        }

        function createBird(xPos) {
            const bird = new THREE.Group();
            const birdMat = new THREE.MeshStandardMaterial({ color: 0x7a233a, roughness: 0.6, flatShading: true });

            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.4), birdMat);
            body.castShadow = true;
            bird.add(body);

            const beak = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.15), birdMat);
            beak.position.x = 0.5;
            bird.add(beak);

            bird.wingL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.08, 0.6), birdMat);
            bird.wingL.position.z = 0.4;
            bird.wingR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.08, 0.6), birdMat);
            bird.wingR.position.z = -0.4;
            bird.add(bird.wingL, bird.wingR);

            // Птица летит либо низко (надо прыгать), либо на уровне головы (надо приседать)
            const flyHeights = [1.1, 2.1];
            bird.position.set(xPos, flyHeights[Math.floor(Math.random() * flyHeights.length)], 0);
            bird.userData = { type: 'bird' };
            
            scene.add(bird);
            obstacles.push(bird);
        }

        function createMountain(xPos = 70) {
            const mGeo = new THREE.ConeGeometry(8 + Math.random()*8, 12 + Math.random()*15, 4);
            const mMat = new THREE.MeshStandardMaterial({ color: 0x2e2542, roughness: 0.9, flatShading: true });
            const mountain = new THREE.Mesh(mGeo, mMat);
            mountain.rotation.y = Math.random() * Math.PI;
            mountain.position.set(xPos, 4, -18 - Math.random() * 12);
            scene.add(mountain);
            mountains.push(mountain);
        }

        function createCloud() {
            const cloud = new THREE.Group();
            const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9, flatShading: true, transparent:true, opacity: 0.7 });
            const num = 3 + Math.floor(Math.random() * 3);
            for(let i=0; i<num; i++) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(1.5+Math.random(), 0.8+Math.random()*0.5, 1), cloudMat);
                b.position.set(i*0.9, (Math.random()-0.5)*0.3, (Math.random()-0.5)*0.3);
                cloud.add(b);
            }
            cloud.position.set(70, 7 + Math.random() * 4, -8 - Math.random() * 5);
            scene.add(cloud);
            clouds.push(cloud);
        }

        function createScenery() {
            // Мелкие камни по бокам дороги для ощущения скорости
            const geo = new THREE.BoxGeometry(0.2+Math.random()*0.3, 0.2+Math.random()*0.3, 0.2+Math.random()*0.3);
            const mat = new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.9 });
            const mesh = new THREE.Mesh(geo, mat);
            const side = Math.random() > 0.5 ? 3 + Math.random()*2 : -3 - Math.random()*2;
            mesh.position.set(70, 0.05, side);
            scene.add(mesh);
            scenery.push(mesh);
        }

        function createDustParticle() {
            const pGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const pMat = new THREE.MeshBasicMaterial({ color: 0x9999aa, transparent: true, opacity: 0.6 });
            const mesh = new THREE.Mesh(pGeo, pMat);
            mesh.position.set(dino.position.x - 0.5, 0.1, dino.position.z + (Math.random()-0.5)*0.4);
            scene.add(mesh);
            particles.push({
                mesh: mesh,
                vx: -gameSpeed * 0.4 - Math.random()*0.1,
                vy: Math.random()*0.05,
                scale: 1.0
            });
        }

        // --- Игровой Логический Цикл ---
        function animate(time) {
            requestAnimationFrame(animate);

            if (isPlaying) {
                score += 1;
                scoreEl.innerText = Math.floor(score / 5);
                if (gameSpeed < maxGameSpeed) gameSpeed += 0.00008;

                // 1. Красивая динамическая смена дня и ночи
                let cycle = (Math.sin(time * 0.00015) + 1) / 2; // Плавные колебания от 0 до 1
                let currentSky = new THREE.Color().lerpColors(nightSky, daySky, cycle);
                let currentGround = new THREE.Color().lerpColors(nightGround, dayGround, cycle);
                
                scene.background = currentSky;
                scene.fog.color = currentSky;
                ground.material.color = currentGround;
                ambientLight.color = currentSky;
                ambientLight.intensity = 0.2 + cycle * 0.5;
                dirLight.intensity = 0.1 + cycle * 0.8;

                // 2. Управление Динозавриком (Прыжки / Приседания)
                if (isJumping) {
                    jumpVelocity -= gravity;
                    dino.position.y += jumpVelocity;

                    if (dino.position.y <= dinoYFloor) {
                        dino.position.y = dinoYFloor;
                        isJumping = false;
                        jumpVelocity = 0;
                    }
                    dino.legL.rotation.z = 0;
                    dino.legR.rotation.z = 0;
                } else if (isDucking) {
                    // Приседание: сжимаем модельку по высоте, растягиваем по длине
                    dino.scale.set(1.4, 0.5, 1.0);
                    dino.position.y = dinoYFloor - 0.22;
                } else {
                    // Обычный бег
                    dino.scale.set(1.0, 1.0, 1.0);
                    dino.position.y = dinoYFloor;
                    
                    let legSpeed = time * 0.02 * (gameSpeed * 20);
                    dino.legL.rotation.z = Math.sin(legSpeed) * 0.7;
                    dino.legR.rotation.z = -Math.sin(legSpeed) * 0.7;

                    // Создаем пыль из под ног
                    if (Math.random() > 0.5) createDustParticle();
                }

                // 3. Эффекты частиц (Пыль)
                for(let i=particles.length-1; i>=0; i--) {
                    let p = particles[i];
                    p.mesh.position.x += p.vx;
                    p.mesh.position.y += p.vy;
                    p.scale -= 0.03;
                    if(p.scale <= 0) {
                        scene.remove(p.mesh);
                        particles.splice(i, 1);
                    } else {
                        p.mesh.scale.set(p.scale, p.scale, p.scale);
                    }
                }

                // 4. Движение Гор (Медленный Параллакс фон)
                mountainTimer--;
                if(mountainTimer <= 0) { createMountain(); mountainTimer = 50 + Math.random()*50; }
                for (let i = mountains.length - 1; i >= 0; i--) {
                    mountains[i].position.x -= gameSpeed * 0.15; // Движутся в разы медленнее дороги
                    if (mountains[i].position.x < -30) { scene.remove(mountains[i]); mountains.splice(i, 1); }
                }

                // 5. Движение Препятствий и Коллизии
                obstacleTimer -= 1;
                if (obstacleTimer <= 0) {
                    if(score > 300 && Math.random() > 0.6) {
                        createBird(60); // Птицы появляются на счете > 300
                    } else {
                        createCactus(60);
                    }
                    obstacleTimer = 50 + Math.random() * 80 / gameSpeed;
                }

                // Создаем точные Bounding Box для проверки коллизий
                let dinoBox = new THREE.Box3().setFromObject(dino);
                // Немного сузим хитбокс динозавра, чтобы игра прощала микро-касания пикселей
                dinoBox.expandByScalar(-0.08);

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i];
                    obs.position.x -= gameSpeed;

                    // Анимация крыльев птицы
                    if (obs.userData.type === 'bird') {
                        obs.wingL.rotation.x = Math.sin(time * 0.02) * 0.8;
                        obs.wingR.rotation.x = -Math.sin(time * 0.02) * 0.8;
                    }

                    let obsBox = new THREE.Box3().setFromObject(obs);

                    if (dinoBox.intersectsBox(obsBox)) {
                        gameOver();
                    }

                    if (obs.position.x < -15) { scene.remove(obs); obstacles.splice(i, 1); }
                }

                // 6. Движение Облаков и Мелкого декора
                cloudTimer--;
                if(cloudTimer <= 0) { createCloud(); cloudTimer = 100 + Math.random()*150; }
                for(let i=clouds.length-1; i>=0; i--) {
                    clouds[i].position.x -= gameSpeed * 0.25;
                    if(clouds[i].position.x < -30) { scene.remove(clouds[i]); clouds.splice(i, 1); }
                }

                sceneryTimer--;
                if(sceneryTimer <= 0) { createScenery(); sceneryTimer = 5 + Math.random()*15; }
                for(let i=scenery.length-1; i>=0; i--) {
                    scenery[i].position.x -= gameSpeed;
                    if(scenery[i].position.x < -15) { scene.remove(scenery[i]); scenery.splice(i, 1); }
                }
            }

            renderer.render(scene, camera);
        }

        // --- Управление клавиатурой ---
        function onKeyDown(e) {
            if ((e.code === 'Space' || e.code === 'ArrowUp') && !isJumping && !isDucking && isPlaying) {
                jumpVelocity = jumpForce;
                isJumping = true;
            }
            if ((e.code === 'ArrowDown' || e.code === 'KeyS') && !isJumping && isPlaying) {
                isDucking = true;
            }
        }

        function onKeyUp(e) {
            if (e.code === 'ArrowDown' || e.code === 'KeyS') {
                isDucking = false;
            }
        }

        function gameOver() {
            isPlaying = false;
            let finalScore = Math.floor(score / 5);
            finalScoreEl.innerText = finalScore;
            
            if(finalScore > highScore) {
                highScore = finalScore;
                localStorage.setItem('dino3d_highscore', highScore);
                document.getElementById('highscore').innerText = highScore;
            }

            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            obstacles.forEach(obs => scene.remove(obs));
            clouds.forEach(cl => scene.remove(cl));
            scenery.forEach(sc => scene.remove(sc));
            particles.forEach(p => scene.remove(p.mesh));
            obstacles = []; clouds = []; scenery = []; particles = [];

            score = 0;
            gameSpeed = 0.4;
            isJumping = false;
            isDucking = false;
            jumpVelocity = 0;
            obstacleTimer = 0;
            
            dino.position.set(0, dinoYFloor, 0);
            dino.scale.set(1, 1, 1);
            gameOverScreen.style.display = 'none';
            isPlaying = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
